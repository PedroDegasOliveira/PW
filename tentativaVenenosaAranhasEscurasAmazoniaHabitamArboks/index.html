<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestão de Funcionários</title>
    <link rel="stylesheet" href="CSS/style.css">
    <link href='https://unpkg.com/boxicons@2.1.1/css/boxicons.min.css' rel='stylesheet'>
</head>

<body>

    <!-- Login Screen -->
    <div id="loginScreen" class="login-screen active">
        <div class="login-container">
            <div class="login-card">
                <div class="login-header">
                    <i class='bx bx-lock-alt'></i>
                    <h1>Sistema de Gestão</h1>
                    <p>Cadastro de Funcionários</p>
                </div>
                <form id="loginForm" class="login-form">
                    <div class="form-group">
                        <label for="login-user">Usuário</label>
                        <input id="login-user" type="text" placeholder="Digite seu usuário" required />
                    </div>

                    <div class="form-group">
                        <label for="login-password">Senha</label>
                        <input id="login-password" type="password" placeholder="Digite sua senha" required />
                    </div>

                    <button type="submit" class="login-btn">Entrar</button>

                    <div class="login-footer">
                        <p>Credenciais de teste:</p>
                        <p><strong>Usuário:</strong> admin</p>
                        <p><strong>Senha:</strong> 123456</p>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Main Application -->
    <div id="mainApp" class="main-app">
        <div class="container">
            <div class="header">
                <div class="header-left">
                    <span>Cadastro de Funcionários</span>
                </div>
                <div class="header-right">
                    <button onclick="openModal()" id="new" class="btn-novo">
                        <i class='bx bx-plus'></i>Incluir
                    </button>
                    <button onclick="logout()" class="btn-logout">
                        <i class='bx bx-log-out'></i>Sair
                    </button>
                </div>
            </div>
            <div class="divTable">
                <table>
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>Função</th>
                            <th>Salário</th>
                            <th class="acao">Editar</th>
                            <th class="acao">Excluir</th>
                        </tr>
                    </thead>
                    <tbody>
                    </tbody>
                </table>
            </div>
            <div class="modal-container">
                <div class="modal">
                    <div class="modal-header">
                        <h2>Funcionário</h2>
                        <button type="button" onclick="closeModal()" class="close-btn">
                            <i class='bx bx-x'></i>
                        </button>
                    </div>
                    <form>
                        <div class="form-group">
                            <label for="m-nome">Nome</label>
                            <input id="m-nome" type="text" required />
                        </div>

                        <div class="form-group">
                            <label for="m-funcao">Função</label>
                            <input id="m-funcao" type="text" required />
                        </div>

                        <div class="form-group">
                            <label for="m-salario">Salário</label>
                            <input id="m-salario" type="number" step="0.01" required />
                        </div>
                        <button type="submit" id="btnSalvar" class="btn-salvar">Salvar</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="JS/script.js"></script>
</body>

</html>
